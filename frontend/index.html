    <!-- Mobile App Settings & Customization -->
    <meta name="theme-color" content="#070709" />

      content="black-translucent"

    <!-- Icons & Favicons -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Performance Optimization: Resource Hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Search Structured Data (JSON-LD) for Rich Results -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Sonikoma",
        "alternateName": "Super Sonico SoniKoma Video Compiler",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Web",
        "description": "Transform static 4koma manga and webtoons into cinematic videos with AI voice narration, panel cropping, and automated editing.",
        "url": "https://sonikoma.vercel.app",
        "image": "https://sonikoma.vercel.app/logo.png",
        "author": {
          "@type": "Organization",
          "name": "Antigravity Studio"
        },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Sonikoma",
        "url": "https://sonikoma.vercel.app",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://sonikoma.vercel.app/dashboard?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body>
    <!-- Fallback message for disabled Javascript -->
    <noscript>
      <div
        style="
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background-color: #070709;
          color: #fafafa;
          font-family: sans-serif;
          text-align: center;
          padding: 2rem;
        "
      >
        <h1 style="color: #ef4444; font-size: 2rem; margin-bottom: 1rem">
          JavaScript Required
        </h1>
        <p style="color: #a3a3a3; max-width: 500px">
          We're sorry, but Sonikoma requires JavaScript to be
          enabled. Please enable JavaScript in your browser settings to
          continue.
        </p>
      </div>
    </noscript>

    <div id="root"></div>

    <!-- Splash / Loading Screen (replaced automatically when React mounts) -->
    <style>
      #splash-screen-root {
        position: fixed;
        inset: 0;
        background: #070709;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 9999;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .sp-logo {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: linear-gradient(135deg, #a855f7, #06b6d4);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 32px rgba(168, 85, 247, 0.35);
        margin-bottom: 4px;
      }
      .sp-logo svg {
        width: 36px;
        height: 36px;
      }
      .sp-name {
        font-size: 1.1rem;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: -0.01em;
      }
      .sp-tag {
        font-size: 0.7rem;
        color: #71717a;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-top: -8px;
      }
      .sp-spinner {
        width: 24px;
        height: 24px;
        color: #a855f7;
        animation: sp-spin 1s linear infinite;
        margin-top: 8px;
      }
      .sp-bar {
        width: 160px;
        height: 2px;
        background: #1c1c1e;
        border-radius: 9999px;
        overflow: hidden;
      }
      .sp-bar-fill {
        width: 40%;
        height: 100%;
        background: linear-gradient(to right, #a855f7, #06b6d4);
        border-radius: 9999px;
        animation: sp-shimmer 1.4s infinite ease-in-out;
      }
      @keyframes sp-spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes sp-shimmer {
        0% {
          margin-left: -40%;
        }
        100% {
          margin-left: 100%;
        }
      }
    </style>
    <div id="splash-screen-root">
      <div class="sp-logo">
        <img src="/logo.png" style="width: 100%; height: 100%; object-fit: cover; border-radius: 16px;" alt="Logo" />
      </div>
      <div class="sp-name">Sonikoma</div>
      <div class="sp-tag">Initializing</div>
      <svg
        class="sp-spinner"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
      >
        <circle
          cx="12"
          cy="12"
          r="10"
          stroke="currentColor"
          stroke-width="3"
          opacity="0.2"
        />
        <path
          fill="currentColor"
          opacity="0.8"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
        />
      </svg>
      <div class="sp-bar"><div class="sp-bar-fill"></div></div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
