<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Metadata -->
    <title>Webtoon-to-Video Studio - AI Storyboard & Video Production</title>
    <meta name="title" content="Webtoon-to-Video Studio - AI Storyboard & Video Production" />
    <meta name="description" content="Transform static webtoons into cinematic videos. Crop panels, clean speech bubbles, synthesize voice narration, generate music soundtracks, and produce high-quality videos using advanced AI." />
    <meta name="keywords" content="webtoon to video, webtoon animation, ai storyboard, panel extraction, bubble cleaner, speech bubble erase, voice synthesis, webtoon compiler, ai video editor" />
    <meta name="author" content="Antigravity Studio" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://github.com/dheena017/webtoon-to-video-backend" />
    <meta property="og:title" content="Webtoon-to-Video Studio - AI Storyboard & Video Production" />
    <meta property="og:description" content="Transform static webtoons into cinematic videos. Crop panels, clean speech bubbles, synthesize voice narration, generate music soundtracks, and produce high-quality videos using advanced AI." />
    <meta property="og:image" content="/favicon.svg" />
    <meta property="og:site_name" content="Webtoon-to-Video Studio" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://github.com/dheena017/webtoon-to-video-backend" />
    <meta property="twitter:title" content="Webtoon-to-Video Studio - AI Storyboard & Video Production" />
    <meta property="twitter:description" content="Transform static webtoons into cinematic videos. Crop panels, clean speech bubbles, synthesize voice narration, generate music soundtracks, and produce high-quality videos using advanced AI." />
    <meta property="twitter:image" content="/favicon.svg" />

    <!-- Mobile App Settings & Customization -->
    <meta name="theme-color" content="#070709" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Webtoon Video" />

    <!-- Icons & Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Performance Optimization: Resource Hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <!-- Fallback message for disabled Javascript -->
    <noscript>
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #070709; color: #fafafa; font-family: sans-serif; text-align: center; padding: 2rem;">
        <h1 style="color: #ef4444; font-size: 2rem; margin-bottom: 1rem;">JavaScript Required</h1>
        <p style="color: #a3a3a3; max-width: 500px;">We're sorry, but Webtoon-to-Video Studio requires JavaScript to be enabled. Please enable JavaScript in your browser settings to continue.</p>
      </div>
    </noscript>

    <div id="root">
      <!-- High-fidelity Splash / Loading Screen (will be replaced automatically when React mounts) -->
      <style>
        .splash-container {
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          background-color: #070709;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
          color: #fafafa;
        }
        .splash-logo-container {
          position: relative;
          display: flex;
          align-items: center;
          justify-content: center;
          margin-bottom: 2rem;
        }
        .splash-glow {
          position: absolute;
          width: 130px;
          height: 130px;
          border-radius: 50%;
          background: radial-gradient(circle, rgba(168, 85, 247, 0.4) 0%, rgba(99, 102, 241, 0) 70%);
          filter: blur(12px);
          animation: splash-pulse 2s infinite ease-in-out;
        }
        .splash-logo {
          width: 80px;
          height: 80px;
          border-radius: 24px;
          background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
          display: flex;
          align-items: center;
          justify-content: center;
          box-shadow: 0 10px 30px -5px rgba(139, 92, 246, 0.5);
          z-index: 10;
        }
        .splash-logo svg {
          width: 42px;
          height: 42px;
          fill: none;
          stroke: #ffffff;
          stroke-width: 2.5;
        }
        .splash-title {
          font-size: 1.85rem;
          font-weight: 800;
          letter-spacing: -0.025em;
          background: linear-gradient(135deg, #ffffff 30%, #c084fc 70%, #818cf8 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          margin-bottom: 0.5rem;
          text-align: center;
        }
        .splash-subtitle {
          font-size: 0.75rem;
          color: #8a8a8a;
          letter-spacing: 0.15em;
          margin-bottom: 3.5rem;
          text-transform: uppercase;
          font-weight: 600;
        }
        .splash-loader-bar {
          width: 200px;
          height: 4px;
          background-color: #1c1917;
          border-radius: 9999px;
          overflow: hidden;
          position: relative;
        }
        .splash-loader-progress {
          position: absolute;
          left: -100%;
          width: 100%;
          height: 100%;
          background: linear-gradient(to right, #6366f1, #a855f7, #6366f1);
          animation: splash-loading 1.6s infinite cubic-bezier(0.4, 0, 0.2, 1);
          border-radius: 9999px;
        }
        @keyframes splash-pulse {
          0%, 100% { transform: scale(1); opacity: 0.5; }
          50% { transform: scale(1.15); opacity: 0.9; }
        }
        @keyframes splash-loading {
          0% { left: -100%; }
          50% { left: 0%; }
          100% { left: 100%; }
        }
      </style>
      <div id="splash-screen-root" class="splash-container">
        <div class="splash-logo-container">
          <div class="splash-glow"></div>
          <div id="splash-logo-graphic" class="splash-logo">
            <svg viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
            </svg>
          </div>
        </div>
        <h1 id="splash-title-text" class="splash-title">Webtoon-to-Video Studio</h1>
        <p id="splash-subtitle-text" class="splash-subtitle">Initializing Environment</p>
        <div id="splash-loading-bar" class="splash-loader-bar">
          <div class="splash-loader-progress"></div>
        </div>
      </div>
    </div>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
