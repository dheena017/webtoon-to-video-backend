<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Primary SEO Metadata -->
    <title>Sonikoma - AI Storyboard & Video Production</title>

      property="og:title"
      content="Sonikoma - AI Storyboard & Video Production"
    />

      property="og:description"
      content="Transform static webtoons into cinematic videos. Crop panels, clean speech bubbles, synthesize voice narration, generate music soundtracks, and produce high-quality videos using advanced AI."

      property="twitter:url"
      content="https://sonikoma.vercel.app"
    />

      property="twitter:title"
      content="Sonikoma - AI Storyboard & Video Production"

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Sonikoma" />

    <!-- Icons & Favicons -->
    <link rel="icon" href="/logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Performance Optimization: Resource Hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Search Structured Data (JSON-LD) for Rich Results -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Sonikoma",
        "alternateName": "Sonikoma Video Compiler",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Web",
        "description": "Transform static 4koma manga and webtoons into cinematic videos with AI voice narration, panel cropping, and automated editing.",
        "url": "https://sonikoma.vercel.app",
        "image": "https://sonikoma.vercel.app/logo.png",
        "author": {
          "@type": "Organization",
          "name": "Antigravity Studio"
        },
        "offers": {
          "@type": "Offer",
          "price": "19",
          "priceCurrency": "USD"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Sonikoma",
        "url": "https://sonikoma.vercel.app",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://sonikoma.vercel.app/dashboard?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

  <body>

          flex-direction: column;

          padding: 2rem;
        "
      >
        <h1 style="color: #ef4444; font-size: 2rem; margin-bottom: 1rem">
          JavaScript Required
        </h1>
        <p style="color: #a3a3a3; max-width: 500px">
          We're sorry, but Sonikoma requires JavaScript to be enabled. Please
          enable JavaScript in your browser settings to continue.
        </p>
      </div>
    </noscript>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
