name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build Frontend
        run: npm run build:frontend

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0 ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Ensure CPU PyTorch is installed so we don't time out or OOM
          pip install --extra-index-url https://download.pytorch.org/whl/cpu torch torchvision torchaudio
          pip install -r requirements.txt

      - name: Check Backend Syntax
        run: |
          # Basic validation to ensure the backend app doesn't have syntax errors
          python -m py_compile backend/python/main.py
